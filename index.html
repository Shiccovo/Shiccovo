<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shiccovo · 3D Tech Stack</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-2: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --green: #7ee787;
    --green-2: #2ea043;
    --blue: #58a6ff;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #c { display: block; width: 100vw; height: 100vh; cursor: grab; }
  #c:active { cursor: grabbing; }

  .hud {
    position: fixed;
    z-index: 10;
    background: rgba(22, 27, 34, 0.78);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
  }

  .hud-tl {
    top: 22px;
    left: 22px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hud-tl .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--green);
    box-shadow: 0 0 18px rgba(126, 231, 135, 0.45);
    object-fit: cover;
    background: var(--bg-2);
  }
  .hud-tl h1 {
    font-size: 16px; font-weight: 600; line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .hud-tl h1 a {
    color: var(--text); text-decoration: none;
  }
  .hud-tl h1 a:hover { color: var(--blue); }
  .hud-tl p {
    font-size: 11.5px; color: var(--text-muted); margin-top: 3px;
    font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', monospace;
    letter-spacing: 0.02em;
  }

  .hud-tr {
    top: 22px; right: 22px;
    text-align: right;
  }
  .hud-tr .grade-row {
    display: flex; align-items: baseline; justify-content: flex-end;
    gap: 12px;
  }
  .hud-tr .grade {
    font-size: 54px; font-weight: 800;
    color: var(--green);
    line-height: 0.95;
    letter-spacing: -0.04em;
    text-shadow: 0 0 28px rgba(126, 231, 135, 0.55);
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
  }
  .hud-tr .score {
    font-size: 18px; color: var(--text-muted);
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
  }
  .hud-tr .score b { color: var(--text); font-weight: 600; }
  .hud-tr .desc {
    font-size: 11.5px; color: var(--text-muted); margin-top: 6px;
    letter-spacing: 0.01em;
  }

  .hud-bl {
    bottom: 22px; left: 22px;
    display: flex; flex-direction: column; gap: 10px;
    min-width: 240px;
  }
  .legend-row {
    display: flex; align-items: center; gap: 12px;
    font-size: 12.5px;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
  }
  .legend-row .dot {
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 10px currentColor;
  }
  .legend-row.backend  .dot,
  .legend-row.backend  .pct  { color: var(--green); }
  .legend-row.backend  .dot { background: var(--green); }
  .legend-row.frontend .dot,
  .legend-row.frontend .pct  { color: var(--blue); }
  .legend-row.frontend .dot { background: var(--blue); }
  .legend-row.embedded .dot,
  .legend-row.embedded .pct  { color: var(--yellow); }
  .legend-row.embedded .dot { background: var(--yellow); }
  .legend-row .label { color: var(--text); width: 76px; }
  .legend-row .pct { font-weight: 600; }
  .legend-row .count { color: var(--text-muted); margin-left: auto; }

  .hud-br {
    bottom: 22px; right: 22px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    text-align: right;
    line-height: 1.7;
  }
  .hud-br kbd {
    display: inline-block;
    background: #21262d;
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--text);
    font-size: 10px;
    margin: 0 2px;
    font-family: inherit;
  }

  #tooltip {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    background: rgba(13, 17, 23, 0.96);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    transform: translate(-50%, calc(-100% - 14px));
    opacity: 0;
    transition: opacity 0.12s;
    box-shadow: 0 0 16px rgba(126, 231, 135, 0.35);
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  #tooltip.show { opacity: 1; }

  #loader {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  #loader .pulse {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 28px var(--green);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.7); opacity: 0.4; }
  }

  .source {
    position: fixed;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(139, 148, 158, 0.45);
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    letter-spacing: 0.08em;
    z-index: 5;
  }
  .source a {
    color: rgba(139, 148, 158, 0.7);
    text-decoration: none;
  }
  .source a:hover { color: var(--green); }

  @media (max-width: 720px) {
    .hud { padding: 10px 14px; }
    .hud-tr .grade { font-size: 40px; }
    .hud-bl { min-width: auto; }
    .hud-br { display: none; }
  }
</style>
</head>
<body>

<div id="loader"><div class="pulse"></div></div>
<canvas id="c"></canvas>
<div id="tooltip"></div>

<div class="hud hud-tl">
  <img class="avatar" id="avatarImg" src="./avatar.png" alt="Shiccovo">
  <div>
    <h1><a href="https://github.com/Shiccovo" target="_blank" rel="noopener">Shiccovo</a></h1>
    <p>4y · 3 followers · Sr Full-Stack</p>
  </div>
</div>

<div class="hud hud-tr">
  <div class="grade-row">
    <div class="grade">A</div>
    <div class="score"><b>8.73</b>/10</div>
  </div>
  <div class="desc">Above 93% of GitHub developers</div>
</div>

<div class="hud hud-bl">
  <div class="legend-row backend"><span class="dot"></span><span class="label">Backend</span><span class="pct">50.91%</span><span class="count">17 techs</span></div>
  <div class="legend-row frontend"><span class="dot"></span><span class="label">Frontend</span><span class="pct">47.27%</span><span class="count">7 techs</span></div>
  <div class="legend-row embedded"><span class="dot"></span><span class="label">Embedded</span><span class="pct">1.82%</span><span class="count">1 tech</span></div>
</div>

<div class="hud-br">
  <div><kbd>Drag</kbd> rotate &nbsp;·&nbsp; <kbd>Scroll</kbd> zoom</div>
  <div>Hover a node for details</div>
</div>

<script>
// Three.js loader with CDN fallback chain — picks first reachable mirror.
window.__threeReady = new Promise((resolve, reject) => {
  const cdns = [
    'https://cdn.staticfile.net/three.js/r128/three.min.js',
    'https://cdn.staticfile.org/three.js/r128/three.min.js',
    'https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js',
  ];
  let i = 0;
  (function tryNext() {
    if (i >= cdns.length) {
      reject(new Error('All CDNs unreachable'));
      return;
    }
    const url = cdns[i++];
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => {
      console.log('[three.js] loaded from', url);
      resolve();
    };
    s.onerror = () => {
      console.warn('[three.js] failed:', url);
      tryNext();
    };
    document.head.appendChild(s);
  })();
});
</script>

<script>
window.__threeReady.then(() => {
// ============================================================
//  DATA — from GitRoll Shiccovo profile
// ============================================================
const DATA = {
  backend: {
    color: 0x7ee787,
    radius: 12.0,
    tilt: 0,
    items: [
      'MongoDB','Mongoose','Express','Fastify','Next.js',
      'Redis','Passport.js','Socket.IO','WebSocket','SQL',
      'Microservices','API Dev','RESTful',
      'Server Cache','Auth','Scaling','Dotenv'
    ],
  },
  frontend: {
    color: 0x58a6ff,
    radius: 7.5,
    tilt: Math.PI / 3,
    items: [
      'React','Next.js','CSS','Axios',
      'WebSocket','UI Dev','RESTful'
    ],
  },
  embedded: {
    color: 0xd29922,
    radius: 4.2,
    tilt: Math.PI / 2 - 0.15,
    items: ['IoT Cloud'],
  },
};

// ============================================================
//  THREE INIT
// ============================================================
const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.Fog(0x0d1117, 24, 70);

const camera = new THREE.PerspectiveCamera(
  48, window.innerWidth / window.innerHeight, 0.1, 200
);
camera.position.set(0, 7, 26);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

// custom orbit controls (no external dep)
const cam = {
  yaw: 0,
  pitch: 0.28,
  dist: 26,
  yawTarget: 0,
  pitchTarget: 0.28,
  distTarget: 26,
};
let dragging = false;
let lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', (e) => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointerup', (e) => {
  dragging = false;
  try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
});
canvas.addEventListener('pointercancel', () => { dragging = false; });
canvas.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  cam.yawTarget   -= dx * 0.0055;
  cam.pitchTarget -= dy * 0.0055;
  cam.pitchTarget = Math.max(-1.35, Math.min(1.35, cam.pitchTarget));
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  cam.distTarget += e.deltaY * 0.018;
  cam.distTarget = Math.max(9, Math.min(48, cam.distTarget));
}, { passive: false });

// ============================================================
//  STAR FIELD
// ============================================================
(function stars() {
  const N = 1500;
  const geom = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 55 + Math.random() * 75;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xc9d1d9, size: 0.16,
    transparent: true, opacity: 0.55,
    sizeAttenuation: true, depthWrite: false,
  });
  scene.add(new THREE.Points(geom, mat));
})();

// ============================================================
//  LIGHTING
// ============================================================
scene.add(new THREE.AmbientLight(0x40485a, 0.7));
const keyLight = new THREE.PointLight(0x7ee787, 1.4, 60, 1.2);
keyLight.position.set(0, 0, 0);
scene.add(keyLight);
const rim = new THREE.DirectionalLight(0x58a6ff, 0.45);
rim.position.set(8, 12, 6);
scene.add(rim);

// ============================================================
//  TEXT LABEL  (CanvasTexture → Sprite)
// ============================================================
// ============================================================
//  GLOW SPRITE  (bloom substitute)
// ============================================================
function makeGlowTexture() {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0,    'rgba(255,255,255,0.95)');
  g.addColorStop(0.18, 'rgba(255,255,255,0.55)');
  g.addColorStop(0.5,  'rgba(255,255,255,0.18)');
  g.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(cv);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}
const GLOW_TEX = makeGlowTexture();

function makeGlow(color, size) {
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: GLOW_TEX,
    color,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  }));
  sprite.scale.set(size, size, 1);
  return sprite;
}

// ============================================================
//  TEXT LABEL  (CanvasTexture → Sprite)
// ============================================================
function makeLabel(text, hexColor) {
  const cv = document.createElement('canvas');
  const ctx = cv.getContext('2d');
  const dpr = 2.5;
  const fs = 32;
  const fontStr = `600 ${fs}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif`;
  ctx.font = fontStr;
  const m = ctx.measureText(text);
  const w = Math.ceil(m.width) + 28;
  const h = fs + 18;
  cv.width = w * dpr;
  cv.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.font = fontStr;
  ctx.textBaseline = 'middle';
  // glow
  ctx.shadowColor = hexColor;
  ctx.shadowBlur = 14;
  ctx.fillStyle = hexColor;
  ctx.fillText(text, 14, h/2);
  // crisper second pass
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#e6edf3';
  ctx.fillText(text, 14, h/2);

  const tex = new THREE.CanvasTexture(cv);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.anisotropy = 4;

  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false, depthTest: true,
  }));
  const s = 0.013;
  sprite.scale.set(w * s, h * s, 1);
  return sprite;
}

// ============================================================
//  ORBIT RING + DOTS
// ============================================================
function makeRing(radius, color, tilt) {
  const ringGeom = new THREE.RingGeometry(radius - 0.015, radius + 0.015, 256);
  const ringMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.22,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = -Math.PI / 2 + tilt;
  scene.add(ring);

  // tick dots along the ring
  const tickN = 96;
  const tg = new THREE.BufferGeometry();
  const tp = new Float32Array(tickN * 3);
  for (let i = 0; i < tickN; i++) {
    const a = (i / tickN) * Math.PI * 2;
    tp[i*3]   = Math.cos(a) * radius;
    tp[i*3+1] = 0;
    tp[i*3+2] = Math.sin(a) * radius;
  }
  tg.setAttribute('position', new THREE.BufferAttribute(tp, 3));
  const tm = new THREE.PointsMaterial({
    color, size: 0.07, transparent: true, opacity: 0.55,
    sizeAttenuation: true, depthWrite: false,
  });
  const ticks = new THREE.Points(tg, tm);
  ticks.rotation.x = tilt;
  scene.add(ticks);
}

// ============================================================
//  TECH NODES
// ============================================================
const orbitGroups = [];
const allNodes = [];

function buildOrbit(stack, key) {
  const orbitGroup = new THREE.Group();
  orbitGroup.rotation.x = stack.tilt;
  scene.add(orbitGroup);

  makeRing(stack.radius, stack.color, stack.tilt);

  const colorObj = new THREE.Color(stack.color);
  const hex = '#' + colorObj.getHexString();
  const items = [];
  const N = stack.items.length;

  stack.items.forEach((name, i) => {
    const angle = (i / N) * Math.PI * 2 + (key === 'frontend' ? 0.18 : 0);
    const x = Math.cos(angle) * stack.radius;
    const z = Math.sin(angle) * stack.radius;

    // sphere
    const size = 0.36;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(size, 28, 28),
      new THREE.MeshStandardMaterial({
        color: colorObj,
        emissive: colorObj,
        emissiveIntensity: 0.85,
        roughness: 0.35,
        metalness: 0.55,
      })
    );
    sphere.position.set(x, 0, z);

    // halo (sprite-glow, bloom substitute)
    const halo = makeGlow(colorObj, size * 5.2);
    halo.material.opacity = 0.55;
    halo.position.copy(sphere.position);

    // label sprite — offset along radial-outward direction so it doesn't sit on the sphere
    const label = makeLabel(name, hex);
    const labelOffset = 0.95;
    label.position.set(
      x + Math.cos(angle) * labelOffset * 0.0,
      0.95,
      z + Math.sin(angle) * labelOffset * 0.0
    );

    // line back to centre
    const lineGeom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(x, 0, z),
    ]);
    const line = new THREE.Line(
      lineGeom,
      new THREE.LineBasicMaterial({
        color: colorObj, transparent: true, opacity: 0.07,
        depthWrite: false,
      })
    );

    orbitGroup.add(sphere, halo, label, line);

    const node = {
      mesh: sphere, halo, label,
      name, color: stack.color, hex,
      angle, baseAngle: angle,
      stack: key,
    };
    items.push(node);
    allNodes.push(node);
  });

  orbitGroups.push({ ...stack, key, group: orbitGroup, items });
}

Object.entries(DATA).forEach(([k, v]) => buildOrbit(v, k));

// ============================================================
//  CENTER — Avatar disc + glow ring
// ============================================================
const centerGroup = new THREE.Group();
scene.add(centerGroup);

// circular alpha mask
const alphaCv = document.createElement('canvas');
alphaCv.width = alphaCv.height = 256;
(function () {
  const c = alphaCv.getContext('2d');
  c.fillStyle = '#000';
  c.fillRect(0, 0, 256, 256);
  c.beginPath();
  c.arc(128, 128, 124, 0, Math.PI * 2);
  c.fillStyle = '#fff';
  c.fill();
})();
const alphaTex = new THREE.CanvasTexture(alphaCv);

// fallback texture (used until <img> finishes loading)
const fallbackCv = document.createElement('canvas');
fallbackCv.width = fallbackCv.height = 256;
(function () {
  const c = fallbackCv.getContext('2d');
  const grad = c.createRadialGradient(128, 128, 10, 128, 128, 128);
  grad.addColorStop(0, '#2ea043');
  grad.addColorStop(1, '#0d3a14');
  c.fillStyle = grad;
  c.fillRect(0, 0, 256, 256);
  c.fillStyle = '#e6edf3';
  c.font = '700 120px -apple-system, BlinkMacSystemFont, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('S', 128, 138);
})();
const fallbackTex = new THREE.CanvasTexture(fallbackCv);

const avatarMat = new THREE.MeshBasicMaterial({
  map: fallbackTex,
  alphaMap: alphaTex,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const avatarMesh = new THREE.Mesh(
  new THREE.CircleGeometry(1.45, 64),
  avatarMat
);
centerGroup.add(avatarMesh);

// glowing torus around the avatar
const torus = new THREE.Mesh(
  new THREE.TorusGeometry(1.6, 0.045, 16, 80),
  new THREE.MeshBasicMaterial({ color: 0x7ee787 })
);
centerGroup.add(torus);

// soft outer halo (sprite-glow, billboard so always faces camera)
const outerHalo = makeGlow(new THREE.Color(0x7ee787), 7.5);
outerHalo.material.opacity = 0.7;
scene.add(outerHalo);  // sprite billboards itself; in scene root not centerGroup

// load real avatar (local file, same-origin)
const realAvatar = new Image();
realAvatar.onload = () => {
  const tex = new THREE.Texture(realAvatar);
  tex.encoding = THREE.sRGBEncoding;
  tex.needsUpdate = true;
  avatarMat.map = tex;
  avatarMat.needsUpdate = true;
  hideLoader();
};
realAvatar.onerror = hideLoader;
realAvatar.src = './avatar.png';

function hideLoader() {
  const el = document.getElementById('loader');
  if (el) el.classList.add('hide');
}
setTimeout(hideLoader, 2500);  // safety net

// ============================================================
//  HOVER — raycaster
// ============================================================
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-2, -2);
const tooltip = document.getElementById('tooltip');
let hovered = null;

window.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = e.clientX + 'px';
  tooltip.style.top = e.clientY + 'px';
});

// ============================================================
//  ANIMATE
// ============================================================
const clock = new THREE.Clock();
let introT = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // gentle global drift on each orbit ring (parallax)
  orbitGroups.forEach((g, i) => {
    const speed = 0.04 + i * 0.025;
    g.group.rotation.y += dt * speed;
    // bob spheres along local y
    g.items.forEach((n, j) => {
      const phase = j * 0.45 + i * 1.2;
      n.mesh.position.y = Math.sin(t * 1.2 + phase) * 0.09;
      n.halo.position.y = n.mesh.position.y;
      n.label.position.y = 0.95 + n.mesh.position.y;
    });
  });

  // centre group billboards toward camera
  centerGroup.lookAt(camera.position);
  // pulse torus + halo
  const pulse = 1 + Math.sin(t * 1.6) * 0.05;
  torus.scale.set(pulse, pulse, pulse);
  outerHalo.material.opacity = 0.55 + Math.sin(t * 1.6) * 0.12;

  // camera spring toward target (drag/zoom feel)
  cam.yaw   += (cam.yawTarget   - cam.yaw)   * 0.08;
  cam.pitch += (cam.pitchTarget - cam.pitch) * 0.08;
  cam.dist  += (cam.distTarget  - cam.dist)  * 0.08;

  // intro dolly-in (only adjusts dist target so user can override mid-flight)
  if (introT < 1) {
    introT = Math.min(1, introT + dt / 2.5);
    const eased = 1 - Math.pow(1 - introT, 3);
    cam.distTarget = 30 - eased * 4.5;
  }

  const cy = Math.cos(cam.yaw),   sy = Math.sin(cam.yaw);
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  camera.position.set(sy * cp * cam.dist, sp * cam.dist, cy * cp * cam.dist);
  camera.lookAt(0, 0, 0);

  // hover detection
  raycaster.setFromCamera(pointer, camera);
  const meshes = allNodes.map(n => n.mesh);
  const hits = raycaster.intersectObjects(meshes, false);

  if (hits.length) {
    const hit = hits[0].object;
    const node = allNodes.find(n => n.mesh === hit);
    if (hovered !== node) {
      if (hovered) {
        hovered.mesh.scale.setScalar(1);
        hovered.halo.material.opacity = 0.55;
      }
      hovered = node;
      node.mesh.scale.setScalar(1.7);
      node.halo.material.opacity = 1.0;
      tooltip.textContent = node.name;
      tooltip.style.color = node.hex;
      tooltip.style.borderColor = node.hex;
      tooltip.style.boxShadow = `0 0 16px ${node.hex}55`;
      tooltip.classList.add('show');
      canvas.style.cursor = 'pointer';
    }
  } else if (hovered) {
    hovered.mesh.scale.setScalar(1);
    hovered.halo.material.opacity = 0.55;
    hovered = null;
    tooltip.classList.remove('show');
    canvas.style.cursor = 'grab';
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
}).catch((err) => {
  console.error('[three.js] load failed:', err);
  const el = document.getElementById('loader');
  if (el) el.innerHTML =
    '<div style="color:#ff7b72;font-family:SFMono-Regular,Consolas,monospace;font-size:13px;text-align:center;padding:24px;line-height:1.7;max-width:400px">' +
      'Unable to load three.js from any CDN.<br>' +
      '<span style="color:#8b949e">Try a VPN, or download three.min.js (r128) and reference it locally.</span>' +
    '</div>';
});
</script>
